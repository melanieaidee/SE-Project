{% extends 'base.html' %}

{% block content %}

<html lang="en">
<head>
<meta charset="UTF-8">
<title>VaqueroConnect</title>

<style>

body{
    background:#e6e6e6;
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
}

/* top orange section */
.top-section{
    width:65%;
    height:300px;
    background:linear-gradient(135deg,#ff6f1a,#ff8c42);
    margin:40px auto;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* title box */
.title-box{
    background:#ff9b5e;
    padding:18px 55px;
    border-radius:25px;
    box-shadow:0 6px 15px rgba(0,0,0,0.25);
}

.title-box h1{
    margin:0;
    font-size:30px;
}

/* gray section */
.bottom-section{
    background:#6a6a6a;
    width:100%;
    padding:50px 0;
    border-top-left-radius:30px;
    border-top-right-radius:30px;
    display:flex;
    justify-content:center;
}

/* contact box */
.contact-box{
    background:linear-gradient(135deg,#ff6f1a,#ff8c42);
    width:60%;
    height:150px;
    border-radius:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    box-shadow:0 8px 20px rgba(0,0,0,0.3);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
}

/* hover effect */
.contact-box:hover{
    transform:translateY(-5px);
    box-shadow:0 12px 25px rgba(0,0,0,0.35);
}

</style>
</head>

<body>

<div class="top-section">
    <div class="title-box">
        <h1>VaqueroConnect</h1>
    </div>
</div>



</body>
</html>
{% endblock %}
